<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOW IT WORKS 시공 프로세스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:  #FFFFFF;
  --bg:     #F0F0F0;
  --text:   #1A1A1A;
  --text2:  #666666;
  --text3:  #999999;
  --gold:   #B8963C;
  --border: #CCCCCC;
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 32px 60px 32px;
}

/* ── 섹션 헤더 ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}
.section-bar {
  width: 5px; height: 24px;
  background: var(--gold);
  border-radius: 2px;
  flex-shrink: 0;
}
.section-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* ── 서브 타이틀 ── */
.section-sub {
  text-align: center;
  font-size: 20px;
  color: var(--text2);
  margin-bottom: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.section-sub::before {
  content: '';
  width: 24px; height: 1.5px;
  background: var(--text2);
}

/* ── 프로세스 전체 ── */
.process-wrap {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
}

/* ── 각 스텝 ── */
.step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── 번호 원 ── */
.step-num-wrap {
  display: flex;
  align-items: center;
  width: 100%;
  justify-content: center;
  margin-bottom: 20px;
  position: relative;
}

.step-num {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 500;
  color: var(--text);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  transition: all 0.25s ease;
}

.step:hover .step-num {
  border-color: var(--gold);
  color: var(--gold);
}

/* 화살표 연결선 */
.step-arrow {
  display: flex;
  align-items: center;
  flex: 1;
  padding: 0 4px;
  padding-bottom: 20px;
}

.step-arrow-line {
  flex: 1;
  height: 1px;
  background: var(--border);
  position: relative;
}

.step-arrow-line::after {
  content: '';
  position: absolute;
  right: -5px; top: -4px;
  width: 8px; height: 8px;
  border-top: 1.5px solid var(--border);
  border-right: 1.5px solid var(--border);
  transform: rotate(45deg);
}

/* ── 큰 원형 ── */
.step-circle {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  transition: all 0.25s ease;
}

.step:hover .step-circle {
  background: #E4E4E4;
}

.step-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

/* ── 골드 구분선 ── */
.step-divider {
  width: 36px; height: 2px;
  background: var(--gold);
  border-radius: 2px;
  margin-bottom: 16px;
}

/* ── 설명 텍스트 ── */
.step-desc {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.8;
  text-align: center;
  font-weight: 400;
  padding: 0 4px;
}

/* ── 반응형 ── */
@media (max-width: 900px) {
  body { padding: 24px 24px 24px; }
  .process-wrap { flex-direction: column; align-items: center; gap: 0; }
  .step { flex-direction: row; width: 100%; max-width: 400px; align-items: flex-start; gap: 20px; padding: 20px 0; border-bottom: 1px solid #EEEEEE; }
  .step:last-child { border-bottom: none; }
  .step-num-wrap { width: auto; margin-bottom: 0; flex-direction: column; gap: 0; }
  .step-num { width: 48px; height: 48px; font-size: 16px; }
  .step-arrow { display: none; }
  .step-circle { width: 80px; height: 80px; flex-shrink: 0; margin-bottom: 0; }
  .step-name { font-size: 15px; }
  .step-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .step-divider { margin-bottom: 8px; }
  .step-desc { text-align: left; font-size: 14px; }
  .section-title { font-size: 17px; }
}

@media (max-width: 480px) {
  body { padding: 20px 20px 20px; }
}

/* ── 애니메이션 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-header { animation: fadeUp 0.5s ease both; }
.section-sub    { animation: fadeUp 0.5s 0.08s ease both; }
.step:nth-child(1) { animation: fadeUp 0.5s 0.12s ease both; }
.step:nth-child(2) { animation: fadeUp 0.5s 0.20s ease both; }
.step:nth-child(3) { animation: fadeUp 0.5s 0.28s ease both; }
.step:nth-child(4) { animation: fadeUp 0.5s 0.36s ease both; }
.step:nth-child(5) { animation: fadeUp 0.5s 0.44s ease both; }
</style>
</head>
<body>

<!-- 섹션 헤더 -->
<div class="section-header">
  <div class="section-bar"></div>
  <div class="section-title">HOW IT WORKS &nbsp; 시공 프로세스</div>
</div>

<!-- 서브 타이틀 -->
<div class="section-sub">상담부터 시공까지 이렇게 진행됩니다</div>

<!-- 프로세스 -->
<div class="process-wrap">

  <!-- Step 1 -->
  <div class="step">
    <div class="step-num-wrap">
      <div class="step-num">1</div>
    </div>
    <div class="step-circle">
      <div class="step-name">상담접수</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-desc">사진과 간단한<br>정보전달</div>
  </div>

  <!-- 화살표 -->
  <div class="step-arrow"><div class="step-arrow-line"></div></div>

  <!-- Step 2 -->
  <div class="step">
    <div class="step-num-wrap">
      <div class="step-num">2</div>
    </div>
    <div class="step-circle">
      <div class="step-name">현장실측</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-desc">무료 방문 실측으로<br>정확한 견적 확정</div>
  </div>

  <!-- 화살표 -->
  <div class="step-arrow"><div class="step-arrow-line"></div></div>

  <!-- Step 3 -->
  <div class="step">
    <div class="step-num-wrap">
      <div class="step-num">3</div>
    </div>
    <div class="step-circle">
      <div class="step-name">견적안내</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-desc">예상 비용, 진행범위<br>및 일정 조율</div>
  </div>

  <!-- 화살표 -->
  <div class="step-arrow"><div class="step-arrow-line"></div></div>

  <!-- Step 4 -->
  <div class="step">
    <div class="step-num-wrap">
      <div class="step-num">4</div>
    </div>
    <div class="step-circle">
      <div class="step-name">계약 및 결제</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-desc">계약서 작성 및<br>결제 진행. 일정 최종 확정</div>
  </div>

  <!-- 화살표 -->
  <div class="step-arrow"><div class="step-arrow-line"></div></div>

  <!-- Step 5 -->
  <div class="step">
    <div class="step-num-wrap">
      <div class="step-num">5</div>
    </div>
    <div class="step-circle">
      <div class="step-name">시공 진행</div>
    </div>
    <div class="step-divider"></div>
    <div class="step-desc">5 IN 1 전문팀 투입.<br>철거부터 폐기물 처리까지<br>순차진행</div>
  </div>

</div>

<script>
// 📐 부모창에 높이 전달
// 높이 딱 한 번만 전송 (떨림 방지)
window.addEventListener('load', function() {
  setTimeout(function() {
    var height = document.body.scrollHeight;
    window.parent.postMessage({ type: 'bium-height', height: height }, '*');
  }, 500);
});

// 🔒 우클릭 & 복사 금지
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());
document.addEventListener('copy',        e => e.preventDefault());
document.addEventListener('keydown', e => {
  if ((e.ctrlKey && ['c','a','u','s'].includes(e.key.toLowerCase())) || e.key === 'F12') {
    e.preventDefault();
  }
});
</script>

</body>
</html>
