<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ 자주 묻는 질문</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white:  #FFFFFF;
  --bg:     #F2F2F2;
  --text:   #1A1A1A;
  --text2:  #444444;
  --green:  #3A7D3A;
  --gold:   #B8963C;
  --border: #E0E0E0;
}

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--white);
  color: var(--text);
  padding: 32px 60px 32px;
}

/* ── 섹션 헤더 ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
}
.section-bar {
  width: 5px; height: 24px;
  background: var(--gold);
  border-radius: 2px;
  flex-shrink: 0;
}
.section-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* ── FAQ 리스트 ── */
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.faq-item {
  border-bottom: 1px solid var(--border);
}
.faq-item:first-child {
  border-top: 1px solid var(--border);
}

/* ── 질문 ── */
.faq-q {
  width: 100%;
  background: var(--bg);
  border: none;
  padding: 20px 24px;
  text-align: left;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  transition: background 0.2s;
}

.faq-q:hover {
  background: #EAEAEA;
}

.faq-q.open {
  background: #EAEAEA;
}

.faq-q-text { flex: 1; }

/* 화살표 */
.faq-arrow {
  font-size: 12px;
  color: var(--gold);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}
.faq-q.open .faq-arrow {
  transform: rotate(180deg);
}

/* ── 답변 ── */
.faq-a {
  display: none;
  padding: 20px 24px 24px;
  font-size: 18px;
  color: var(--text2);
  line-height: 1.9;
  background: var(--white);
}

.faq-a.open {
  display: block;
  animation: fadeDown 0.25s ease both;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 초록 강조 텍스트 */
.faq-a .hl {
  color: var(--green);
  font-weight: 700;
}

/* ── 반응형 ── */
@media (max-width: 768px) {
  body { padding: 20px 20px 20px; }
  .faq-q { font-size: 14px; padding: 16px 18px; }
  .faq-a { font-size: 13px; padding: 16px 18px 20px; }
  .section-title { font-size: 17px; }
}

/* ── 페이드인 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-header { animation: fadeUp 0.5s ease both; }
.faq-item:nth-child(1) { animation: fadeUp 0.5s 0.10s ease both; }
.faq-item:nth-child(2) { animation: fadeUp 0.5s 0.18s ease both; }
.faq-item:nth-child(3) { animation: fadeUp 0.5s 0.26s ease both; }
.faq-item:nth-child(4) { animation: fadeUp 0.5s 0.34s ease both; }
</style>
</head>
<body>

<!-- 섹션 헤더 -->
<div class="section-header">
  <div class="section-bar"></div>
  <div class="section-title">FAQ &nbsp; 자주 묻는 질문</div>
</div>

<!-- FAQ 리스트 -->
<div class="faq-list">

  <div class="faq-item">
    <button class="faq-q" onclick="toggleFaq(this)">
      <span class="faq-q-text">1. 욕실공사만 하고 싶은데 욕실만 단독으로 상담 가능한가요?</span>
      <span class="faq-arrow">▼</span>
    </button>
    <div class="faq-a">
      <span class="hl">가능합니다.</span> 욕실 사진과 함께 문의주시면 빠르게 안내드립니다.
    </div>
  </div>

  <div class="faq-item">
    <button class="faq-q" onclick="toggleFaq(this)">
      <span class="faq-q-text">2. 타일시공만 따로 상담 가능한가요?</span>
      <span class="faq-arrow">▼</span>
    </button>
    <div class="faq-a">
      <span class="hl">가능합니다.</span> 시공별로 필요한 부분 상담 및 진행 가능합니다. 현장 조건에 따라 별도 상담 드립니다.
    </div>
  </div>

  <div class="faq-item">
    <button class="faq-q" onclick="toggleFaq(this)">
      <span class="faq-q-text">3. 비움앤타일 서비스 이용 지역은 어떻게 되나요?</span>
      <span class="faq-arrow">▼</span>
    </button>
    <div class="faq-a">
      <span class="hl">서울.경기 전 지역 가능합니다.</span> 각 공정별로 제공되는 서비스 가능 지역은 수도권 전체입니다.
    </div>
  </div>

  <div class="faq-item">
    <button class="faq-q" onclick="toggleFaq(this)">
      <span class="faq-q-text">4. 원패스욕실 서비스와 5in1 패키지 서비스 중 뭘 이용해야할지 모르겠어요.</span>
      <span class="faq-arrow">▼</span>
    </button>
    <div class="faq-a">
      <span class="hl">시공만 필요</span>하시면 <span class="hl">5in1 패키지</span> 선택<br>
      <span class="hl">타일 및 도기 선택부터 고민중</span>이시면 <span class="hl">원패스욕실 서비스</span> 선택을 추천드립니다.
    </div>
  </div>

</div>

<script>
function toggleFaq(btn) {
  var answer = btn.nextElementSibling;
  var isOpen = btn.classList.contains('open');

  // 모두 닫기
  document.querySelectorAll('.faq-q').forEach(function(q) {
    q.classList.remove('open');
    q.nextElementSibling.classList.remove('open');
  });

  // 클릭한 것만 열기 (이미 열려있으면 닫기)
  if (!isOpen) {
    btn.classList.add('open');
    answer.classList.add('open');
    sendHeight();
  }
}

// 📐 부모창에 높이 전달 — load 1회 + 아코디언 클릭시만
function sendHeight() {
  setTimeout(function() {
    var height = document.body.scrollHeight;
    window.parent.postMessage({ type: 'bium-height', height: height }, '*');
  }, 350);
}
window.addEventListener('load', function() { setTimeout(sendHeight, 500); });

// 🔒 우클릭 & 복사 금지
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());
document.addEventListener('copy',        e => e.preventDefault());
document.addEventListener('keydown', e => {
  if ((e.ctrlKey && ['c','a','u','s'].includes(e.key.toLowerCase())) || e.key === 'F12') {
    e.preventDefault();
  }
});
</script>

</body>
</html>
